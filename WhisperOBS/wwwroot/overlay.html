<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>WhisperOBS Captions</title>
    <style>
        /* ════════════════════════════════════════════════════════════════
           CUSTOMISE THIS FILE to change the look of your captions.
           It is loaded from  wwwroot/overlay.html  next to the exe.
           ════════════════════════════════════════════════════════════════ */

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            width: 100%; height: 100%;
            background: transparent;   /* KEEP transparent for OBS */
            overflow: hidden;
        }

        /* ── Where the captions appear ───────────────────────────────── */
        #caption-wrap {
            position: fixed;
            bottom: 60px;              /* distance from bottom of stream */
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 1400px;
            text-align: center;
            pointer-events: none;
        }

        /* ── Caption bubble ──────────────────────────────────────────── */
        #caption {
            display: inline-block;
            font-family: 'Segoe UI', 'Arial', sans-serif;
            font-size: 2.6rem;         /* change size here */
            font-weight: 700;
            line-height: 1.35;
            color: #FFFFFF;            /* text colour */
            text-shadow:
                    -2px -2px 0 #000,
                    2px -2px 0 #000,
                    -2px  2px 0 #000,
                    2px  2px 0 #000,
                    0    4px 8px rgba(0,0,0,0.6);
            padding: 0.25em 0.6em;
            border-radius: 6px;
            background: rgba(0, 0, 0, 0.45); /* semi-transparent pill; set to 'transparent' to remove */
            backdrop-filter: blur(4px);

            opacity: 0;
            transition: opacity 0.25s ease;
        }

        #caption.visible { opacity: 1; }

        /* ── Tiny status indicator (top-left) ───────────────────────── */
        #status {
            position: fixed;
            top: 10px; left: 12px;
            width: 10px; height: 10px;
            border-radius: 50%;
            background: #555;
            transition: background 0.3s;
        }
        #status.connected { background: #2ecc71; }
        #status.error     { background: #e74c3c; }
    </style>
</head>
<body>
<div id="status"></div>
<div id="caption-wrap">
    <span id="caption"></span>
</div>

<script>
    const captionEl = document.getElementById('caption');
    const statusEl  = document.getElementById('status');
    let hideTimer   = null;

    // ── How long each caption stays visible (milliseconds) ───────
    const SHOW_DURATION = 4000;

    function showCaption(text) {
        captionEl.textContent = text;
        captionEl.classList.add('visible');

        clearTimeout(hideTimer);
        hideTimer = setTimeout(() => {
            captionEl.classList.remove('visible');
        }, SHOW_DURATION);
    }

    // ── WebSocket – auto-reconnects if the server restarts ───────
    let ws;
    function connect() {
        ws = new WebSocket(`ws://${location.host}/ws`);

        ws.onopen  = () => { statusEl.className = 'connected'; };
        ws.onclose = ws.onerror = () => {
            statusEl.className = 'error';
            setTimeout(connect, 2000);
        };
        ws.onmessage = (evt) => {
            try {
                const msg = JSON.parse(evt.data);
                if (msg.type === 'caption') showCaption(msg.text);
            } catch { /* ignore */ }
        };
    }
    connect();
</script>
</body>
</html>
